<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Topo Mesh — из импортированного DWG/DXF</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #efefef;
      margin: 0;
      color: #2f2f2f;
      padding: 10px;
      font-size: 12px;
      line-height: 1.35;
    }
    .header-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .logo { flex-shrink: 0; width: 36px; height: 36px; display: block; }
    .logo img { width: 100%; height: 100%; display: block; }
    h1 {
      font-size: 13px;
      font-weight: 600;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      flex: 1;
    }
    .section { margin-bottom: 10px; }
    .section-title {
      font-weight: 600;
      margin-bottom: 5px;
      text-transform: uppercase;
      font-size: 11px;
      color: #54524f;
    }
    .divider { height: 1px; background: #c7c3bd; margin: 8px 0; }
    .form-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    .form-row label {
      width: 155px;
      flex-shrink: 0;
      font-size: 11px;
      color: #3a3a3a;
    }
    .form-row select,
    .form-row input[type="number"],
    .form-row input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 3px 5px;
      border: 1px solid #ada9a4;
      border-radius: 2px;
      background: #ffffff;
      font-size: 12px;
    }
    .sep-group { display: flex; gap: 12px; align-items: center; }
    .sep-group label { font-size: 12px; cursor: pointer; width: auto; }
    .preview-box {
      flex: 1;
      padding: 3px 6px;
      border: 1px solid #c0beb9;
      background: #f9f8f6;
      font-size: 11px;
      min-height: 22px;
      color: #444;
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .preview-ok  { color: #2a6e00; font-weight: 600; }
    .preview-err { color: #900; }
    .btn {
      display: inline-block;
      padding: 4px 10px;
      border: 1px solid #a8a5a2;
      border-radius: 2px;
      background: #dcd9d4;
      color: #2f2f2f;
      font-size: 12px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 #f5f4f2;
      text-align: center;
      width: 100%;
    }
    .btn:hover   { background: #e7e4de; }
    .btn:active  { background: #cac7c2; }
    .btn:disabled { background: #e2e0de; color: #999; cursor: default; }
    .btn-primary { font-weight: 600; }
    .info-box {
      padding: 6px 7px;
      border: 1px solid #c0beb9;
      background: #f9f8f6;
      font-size: 11px;
      line-height: 1.5;
      min-height: 24px;
      max-height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: monospace;
    }
    .info-ok  { color: #2a6e00; font-weight: 600; }
    .info-err { color: #900; font-weight: 600; }

    /* Collapsible help */
    details > summary { list-style: none; cursor: pointer; user-select: none; }
    details > summary::-webkit-details-marker { display: none; }
    details > summary .section-title {
      display: inline;
      margin-bottom: 0;
    }
    details > summary .toggle-arrow { font-size: 10px; color: #777; margin-left: 4px; }
    .help-body {
      margin-top: 6px;
      padding: 7px 9px;
      background: #f4f2ee;
      border: 1px solid #d0cdc8;
      font-size: 11px;
      line-height: 1.6;
    }
    .help-body ol { margin: 4px 0 6px 16px; padding: 0; }
    .help-body p  { margin: 4px 0; }
    .help-body a  { color: #24568c; text-decoration: none; }
    .help-body a:hover { text-decoration: underline; }
    .help-tool { margin-top: 6px; }
    .help-tool strong { color: #333; }
    .help-note { color: #666; font-size: 10px; margin-top: 5px; }

    .units-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .units-row label { width: 155px; flex-shrink: 0; font-size: 11px; color: #3a3a3a; }
    .units-row input[type="number"] {
      flex: 0 0 80px;
      padding: 3px 5px;
      border: 1px solid #ada9a4;
      border-radius: 2px;
      background: #fff;
      font-size: 12px;
    }
    .units-row select {
      flex: 0 0 55px;
      padding: 3px 4px;
      border: 1px solid #ada9a4;
      border-radius: 2px;
      background: #fff;
      font-size: 12px;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
      border: 1px solid #ada9a4;
      border-radius: 3px;
      overflow: hidden;
    }
    .mode-toggle label {
      flex: 1;
      text-align: center;
      padding: 5px 6px;
      font-size: 11px;
      cursor: pointer;
      background: #dcd9d4;
      user-select: none;
    }
    .mode-toggle label.active {
      background: #b8d4f0;
      color: #1a3a5c;
      font-weight: 600;
    }
    .mode-toggle label + label { border-left: 1px solid #ada9a4; }
    .mode-toggle input[type="radio"] { display: none; }

    /* Sub-toggle inside model mode */
    .sub-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 8px;
      border: 1px solid #c0bdb8;
      border-radius: 3px;
      overflow: hidden;
    }
    .sub-toggle label {
      flex: 1;
      text-align: center;
      padding: 4px 6px;
      font-size: 11px;
      cursor: pointer;
      background: #e8e5e0;
      user-select: none;
    }
    .sub-toggle label.active {
      background: #d4e8c8;
      color: #1a4a10;
      font-weight: 600;
    }
    .sub-toggle label + label { border-left: 1px solid #c0bdb8; }
    .sub-toggle input[type="radio"] { display: none; }
  </style>

  <script>
    function $(id) { return document.getElementById(id); }

    function ensureSketchUp(fnName) {
      var su = window.sketchup;
      if (!su || typeof su[fnName] !== 'function') return null;
      return su[fnName].bind(su);
    }

    function setInfo(text, cls) {
      var box = $('infoBox');
      if (!box) return;
      box.textContent = text || '';
      box.className = 'info-box' + (cls ? ' ' + cls : '');
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── URL helper ───────────────────────────────────────────────────────────

    function openUrl(url) {
      var fn = ensureSketchUp('open_url');
      if (fn) fn(url);
    }

    // ── Create dispatcher ────────────────────────────────────────────────────

    function onCreateMesh() {
      createMeshFromModel();
    }

    // Called by Ruby via execute_script when inspect_selection completes
    window.onInspectComplete = function(result) {
      $('btnInspect').disabled = false;
      if (result && result.ok) {
        setInfo(result.report || '', '');
        setModelReport(result.report || '', '');
        populateModelTags(result.tags || []);
      } else {
        var errMsg = 'Ошибка: ' + (result && result.error ? result.error : 'неизвестная ошибка');
        setInfo(errMsg, 'info-err');
        setModelReport(errMsg, 'info-err');
      }
    };

    function inspectSelection() {
      var fn = ensureSketchUp('inspect_selection');
      if (!fn) { setInfo('SketchUp bridge недоступен', 'info-err'); return; }

      setInfo('Анализ выделения…', '');
      setModelReport('Анализ выделения…', '');
      $('btnInspect').disabled = true;

      // SketchUp bridge may not return Promise; Ruby calls onInspectComplete via execute_script
      var p = fn();
      if (p && typeof p.then === 'function') {
        p.then(function(jsonStr) {
          var result = (typeof jsonStr === 'string') ? (function(){ try{ return JSON.parse(jsonStr); }catch(e){ return {}; }})() : jsonStr;
          window.onInspectComplete(result || {});
        }).catch(function(e) {
          window.onInspectComplete({ error: String(e) });
        });
      }
      // If no Promise, onInspectComplete will be called by Ruby execute_script
    }

    function setModelReport(text, cls) {
      var box = $('modelReportBox');
      if (!box) return;
      box.textContent = text || '';
      box.className = 'info-box' + (cls ? ' ' + cls : '');
      box.style.display = (text && text.length > 0) ? '' : 'none';
    }

    function populateModelTags(tags) {
      var selIso = $('tagIsolinesSelect');
      var selElev = $('tagElevationSelect');
      if (!selIso || !selElev) return;
      selIso.innerHTML = '';
      selElev.innerHTML = '';
      if (!tags.length) {
        if ($('rowModelTags')) $('rowModelTags').style.display = 'none';
        if ($('rowModelTagElevation')) $('rowModelTagElevation').style.display = 'none';
        if ($('rowIsolinesParams')) $('rowIsolinesParams').style.display = 'none';
        return;
      }
      tags.forEach(function(t) {
        var o1 = document.createElement('option');
        o1.value = t; o1.textContent = t;
        selIso.appendChild(o1);
        var o2 = document.createElement('option');
        o2.value = t; o2.textContent = t;
        selElev.appendChild(o2);
      });
      if ($('rowModelTags')) $('rowModelTags').style.display = '';
      if ($('rowModelTagElevation')) $('rowModelTagElevation').style.display = '';
      if ($('rowIsolinesParams')) $('rowIsolinesParams').style.display = '';
    }

    function onModelTagChange() { /* reserved */ }

    function createMeshFromModel() {
      var fn = ensureSketchUp('create_mesh_from_model');
      if (!fn) { setInfo('SketchUp bridge недоступен', 'info-err'); return; }

      var meshLayer = $('meshLayerSelect') ? $('meshLayerSelect').value : '';
      var meshName  = ($('meshName') && $('meshName').value.trim()) || 'TopoMesh';
      var tagIso    = $('tagIsolinesSelect') ? $('tagIsolinesSelect').value : '';
      var tagElev   = $('tagElevationSelect') ? $('tagElevationSelect').value : '';
      var zStep     = parseInt($('zStep') && $('zStep').value, 10) || 500;
      var ptsPerContour = parseInt($('ptsPerContour') && $('ptsPerContour').value, 10) || 80;
      var radius    = parseFloat($('radius') && $('radius').value) || 5.0;

      if (!tagIso)  { setInfo('Выберите тег изолиний', 'info-err'); return; }
      if (!tagElev) { setInfo('Выберите тег отметок высоты', 'info-err'); return; }

      setInfo('Построение Mesh (объединённый TIN)…', '');
      $('btnCreate').disabled = true;

      fn(JSON.stringify({
        meshName: meshName,
        meshLayer: meshLayer,
        tagIsolines: tagIso,
        tagElevation: tagElev,
        modelTag: tagIso,
        zStep: zStep,
        ptsPerContour: Math.max(10, Math.min(500, ptsPerContour)),
        radius: radius
      }))
        .then(function(jsonStr) {
          var result;
          try { result = JSON.parse(jsonStr); } catch(e) { result = {}; }
          if (result.ok) {
            var msg = 'Mesh создан: ' + result.point_count + ' точек, ' + result.tri_count + ' треугольников.';
            setInfo(msg, 'info-ok');
          } else {
            setInfo('Ошибка: ' + (result.error || 'неизвестная ошибка'), 'info-err');
          }
        })
        .catch(function(e) { setInfo('Ошибка: ' + e, 'info-err'); })
        .finally(function() { $('btnCreate').disabled = false; });
    }

    function populateMeshLayers(layers) {
      var sel = $('meshLayerSelect');
      if (!sel) return;
      sel.innerHTML = '<option value="">— (по умолчанию)</option>';
      (layers || []).forEach(function(name) {
        var opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        sel.appendChild(opt);
      });
    }

    // ── Init ─────────────────────────────────────────────────────────────────

    window.addEventListener('load', function() {
      setInfo('Выделите импортированный компонент и нажмите «Анализ выделения».', '');
      var fn = ensureSketchUp('get_model_layers');
      if (fn) fn().then(function(json) {
        try { populateMeshLayers(JSON.parse(json)); } catch(e) {}
      }).catch(function() {});
    });
  </script>
</head>
<body>

  <!-- Header -->
  <div class="header-row">
    <div class="logo">
      <img src="images/logo.svg" alt="DXF Mesh">
    </div>
    <h1>Topo Mesh <span style="font-size:10px;color:#777;font-weight:normal">из импорта</span></h1>
  </div>

<div id="sectionModel" class="section">
  <div class="section-title">Из импортированного компонента</div>

  <div style="font-size:11px;color:#555;margin-bottom:6px;line-height:1.6;">
    1. Импортируйте DWG/DXF: <strong>Файл → Импорт</strong><br>
    2. Выделите импортированный компонент в модели<br>
    3. Нажмите <strong>Анализ</strong> → выберите теги<br>
    4. Нажмите <strong>Создать Topo Mesh</strong>
  </div>

  <button id="btnInspect" class="btn" onclick="inspectSelection()" style="margin-bottom:8px;">
    Анализ выделения
  </button>

  <!-- Results of analysis — visible in model mode -->
  <div id="modelReportBox" class="info-box" style="margin-bottom:10px;min-height:80px;max-height:220px;display:none;"></div>

  <!-- Tags: isolines + elevation markers (unified TIN) -->
  <div id="rowModelTags" class="form-row" style="display:none;">
    <label style="font-size:11px;color:#3a3a3a;">1) Тег изолиний:</label>
    <select id="tagIsolinesSelect" onchange="onModelTagChange()"></select>
  </div>
  <div id="rowModelTagElevation" class="form-row" style="display:none;">
    <label style="font-size:11px;color:#3a3a3a;">2) Тег отметок высоты:</label>
    <select id="tagElevationSelect" onchange="onModelTagChange()"></select>
  </div>

  <!-- Params -->
  <div id="rowIsolinesParams" style="display:none; margin-top:8px; padding:8px; background:#f4f2ee; border:1px solid #d0cdc8; border-radius:2px;">
    <div class="form-row" style="margin-bottom:5px;">
      <label for="zStep" style="width:155px;">Шаг высоты (мм):</label>
      <select id="zStep" style="flex:0 0 80px;">
        <option value="500" selected>500</option>
        <option value="1000">1000</option>
      </select>
    </div>
    <div class="form-row" style="margin-bottom:5px;">
      <label for="ptsPerContour" style="width:155px;">Точек на контур:</label>
      <input type="number" id="ptsPerContour" value="80" min="10" max="500" step="5" style="flex:0 0 70px;">
    </div>
    <div class="form-row">
      <label for="radius" style="width:155px;">Радиус поиска отметок (м):</label>
      <input type="number" id="radius" value="5" min="0.5" max="100" step="0.5" style="flex:0 0 70px;">
    </div>
  </div>
</div>

  <div class="divider"></div>

  <!-- Mesh parameters -->
  <div class="section">
    <div class="section-title">Параметры Mesh</div>

    <div class="form-row">
      <label for="meshLayerSelect">Слой для Mesh:</label>
      <select id="meshLayerSelect">
        <option value="">— (по умолчанию)</option>
      </select>
    </div>
    <div class="form-row">
      <label for="meshName">Имя группы:</label>
      <input type="text" id="meshName" value="TopoMesh">
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <button id="btnCreate" class="btn btn-primary" onclick="onCreateMesh()">
      Создать Topo Mesh
    </button>
  </div>

  <div id="infoBox" class="info-box"></div>

</body>
</html>
